<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>cfgify — control-flow graph visualizer</title>
    <meta
      name="description"
      content="Visualize the control-flow graph of Go functions from code in your browser."
    />
    <meta name="theme-color" content="#0f1115" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="cfgify — control-flow graph visualizer" />
    <meta
      property="og:description"
      content="Visualize the control-flow graph of Go functions from code in your browser."
    />
    <meta name="twitter:card" content="summary" />
    <!-- Apply the saved theme before paint to avoid a flash of the wrong colors. -->
    <script>
      try {
        var t = localStorage.getItem('cfgify.theme');
        if (t) document.documentElement.dataset.theme = t;
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>cfgify</title>
  <style>
    :root {
      --bg: #0f1115;
      --panel: #161922;
      --border: #2a2f3a;
      --text: #e6e8ee;
      --muted: #8a93a6;
      --accent: #7aa7ff;
      --err: #ff7676;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: baseline;
      gap: 1rem;
    }
    header h1 { margin: 0; font-size: 1.1rem; letter-spacing: .02em; }
    header .tag {
      font-size: .8rem;
      color: var(--muted);
    }
    main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 1rem 1.5rem;
      height: calc(100vh - 56px);
    }
    section {
      display: flex;
      flex-direction: column;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    section h2 {
      margin: 0;
      padding: .6rem .9rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .5rem;
    }
    .body { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    textarea, pre {
      flex: 1;
      margin: 0;
      padding: .9rem;
      background: transparent;
      color: inherit;
      border: 0;
      outline: 0;
      resize: none;
      font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow: auto;
      white-space: pre;
    }
    .toolbar {
      padding: .6rem .9rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: .75rem;
    }
    button {
      font: inherit;
      padding: .45rem .9rem;
      background: var(--accent);
      color: #0a0d14;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
    }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .status { color: var(--muted); font-size: .85rem; }
    .status.err { color: var(--err); }
  </style>
</head>
<body>
  <header>
    <h1>cfgify</h1>
    <span class="tag">placeholder UI — POST /api/analyze</span>
  </header>
  <main>
    <section>
      <h2>Source</h2>
      <div class="body">
        <textarea id="src" spellcheck="false">package sample

import "fmt"

func EarlyReturn(x int) int {
  if x &lt; 0 {
    return -1
  }
  if x == 0 {
    return 0
  }
  fmt.Println(x)
  return 1
}
</textarea>
        <div class="toolbar">
          <button id="go">Analyze</button>
          <span id="status" class="status">idle</span>
        </div>
      </div>
    </section>
    <section>
      <h2>JSON response</h2>
      <div class="body">
        <pre id="out">// click Analyze</pre>
      </div>
    </section>
  </main>
  <script>
    const btn = document.getElementById('go');
    const status = document.getElementById('status');
    const out = document.getElementById('out');
    const src = document.getElementById('src');

    async function analyze() {
      btn.disabled = true;
      status.textContent = 'analyzing…';
      status.className = 'status';
      try {
        const r = await fetch('/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ language: 'go', source: src.value }),
        });
        const data = await r.json();
        if (!r.ok) {
          status.textContent = data.error || ('error ' + r.status);
          status.className = 'status err';
          out.textContent = '';
          return;
        }
        status.textContent = (data.functions?.length ?? 0) + ' function(s)';
        out.textContent = JSON.stringify(data, null, 2);
      } catch (e) {
        status.textContent = String(e);
        status.className = 'status err';
      } finally {
        btn.disabled = false;
      }
    }
    btn.addEventListener('click', analyze);
  </script>
</body>
</html>

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # goreleaser's before-hooks build the frontend, so Node must be available.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      # Tag push -> publish a real release. Manual dispatch -> snapshot build
      # (no tag required, nothing published), uploaded as a workflow artifact.
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: ${{ github.event_name == 'workflow_dispatch' && 'release --snapshot --clean' || 'release --clean' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: cfgify-snapshot
          path: |
            dist/*.tar.gz
            dist/*.zip